<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — GTM Demo Store (Pixel Only)</title>
  <link rel="stylesheet" href="css/style.css" />

  <script>
    window.dataLayer = window.dataLayer || [];
  </script>
  <!-- GTM Head Snippet — replace GTM-XXXXXXX -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-XXXXXXX');</script>
</head>
<body>

  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <header>
    <a class="logo" href="index.html">🛍 PixelStore</a>
    <nav>
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart <span class="cart-badge">0</span></a>
    </nav>
  </header>

  <div class="container">
    <p style="margin-bottom:20px;color:var(--muted);">
      <a href="index.html" style="color:var(--brand);text-decoration:none;">← Back to Shop</a>
    </p>
    <div class="product-detail" id="product-detail">
      <!-- Populated by JS -->
    </div>
  </div>

  <div id="debug-panel">
    <div class="debug-title">▶ dataLayer Monitor (Scenario 1 — Pixel Only)</div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/products.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const product = getProductById(params.get('id'));

      if (!product) {
        document.getElementById('product-detail').innerHTML =
          '<p>Product not found. <a href="index.html">Return to shop</a></p>';
        return;
      }

      // Render product detail
      document.title = `${product.name} — GTM Demo Store`;
      document.getElementById('product-detail').innerHTML = `
        <img src="${product.image}" alt="${product.name}"
             onerror="this.style.background='#c8d0de';this.removeAttribute('src')" />
        <div class="detail-info">
          <p style="color:var(--muted);font-size:.85rem;margin-bottom:6px;">${product.category}</p>
          <h1>${product.name}</h1>
          <div class="detail-price">$${product.price.toFixed(2)}</div>
          <p class="detail-desc">${product.description}</p>
          <div class="qty-row">
            <label for="qty">Quantity:</label>
            <input type="number" id="qty" value="1" min="1" max="10" />
          </div>
          <button class="btn btn-accent" id="add-to-cart-btn" style="width:100%;margin-bottom:12px;">
            Add to Cart
          </button>
          <a href="cart.html" class="btn btn-outline" style="width:100%;display:block;">View Cart</a>

          <div style="margin-top:24px;padding:16px;background:#f0f2f5;border-radius:8px;font-size:.85rem;color:var(--muted);">
            <strong style="color:var(--text);">📋 GTM Event fired on this page:</strong><br/>
            <code style="color:#1877f2;">pixel_view_content</code> — pushed to dataLayer on page load.<br/>
            GTM triggers the Facebook Pixel <em>ViewContent</em> standard event.
          </div>
        </div>`;

      // ── Fire ViewContent ──────────────────────────────────────────────────
      pushViewContent(product);

      // ── Add to Cart handler ───────────────────────────────────────────────
      document.getElementById('add-to-cart-btn').addEventListener('click', () => {
        const qty = parseInt(document.getElementById('qty').value, 10) || 1;
        Cart.add(product, qty);
        pushAddToCart(product, qty);
        showToast(`✓ Added ${qty}× ${product.name} to cart`);
      });
    });
  </script>
</body>
</html>
