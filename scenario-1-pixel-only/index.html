    window.dataLayer = window.dataLayer || [];
  </script>
  <!-- GTM Head Snippet -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],

<body>

  <!-- GTM Body Snippet -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MV4NXKV4"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End GTM Body Snippet -->

  <!-- ── Header ── -->
  <header>
    <a class="logo" href="index.html">🛍 PixelStore</a>
    <nav>
      <a href="index.html">Shop</a>
      <a href="cart.html">Cart <span class="cart-badge">0</span></a>
    </nav>
  </header>

  <!-- ── Hero Banner ── -->
  <div style="background:linear-gradient(135deg,#1877f2 0%,#0d5dbf 100%);color:#fff;padding:48px 24px;text-align:center;">
    <h1 style="font-size:2rem;margin-bottom:8px;">GTM Demo Store</h1>
    <p style="opacity:.85;font-size:1.1rem;">Scenario 1 — Facebook Pixel (Browser-Side Events Only)</p>
    <div style="margin-top:16px;background:rgba(255,255,255,.15);display:inline-block;padding:8px 20px;border-radius:20px;font-size:.85rem;">
      GTM Container: <strong>GTM-MV4NXKV4</strong> &nbsp;|&nbsp; Pixel ID: <strong>YOUR_PIXEL_ID</strong>
    </div>
  </div>

  <!-- ── Products ── -->
  <div class="container">
    <h2 class="page-title">Featured Products</h2>
    <div class="product-grid" id="product-grid">
      <!-- Populated by JS -->
    </div>
  </div>

  <!-- ── Debug Panel ── -->
  <div id="debug-panel">
    <div class="debug-title">▶ dataLayer Monitor (Scenario 1 — Pixel Only)</div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/products.js"></script>
  <script>
    // Render product grid
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('product-grid');
      PRODUCTS.forEach(p => {
        grid.innerHTML += `
          <a class="product-card" href="product.html?id=${p.id}"
             onclick="pushViewContent_preview('${p.id}')">
            <img src="${p.image}" alt="${p.name}" onerror="this.style.background='#c8d0de';this.removeAttribute('src')" />
            <div class="card-body">
              <div class="card-name">${p.name}</div>
              <div class="card-price">$${p.price.toFixed(2)}</div>
              <div class="card-desc">${p.description}</div>
              <span class="btn btn-primary btn-sm">View Product</span>
            </div>
          </a>`;
      });
    });

    // PageView is fired automatically by GTM on All Pages trigger
    // No manual push needed here — GTM handles it via the Facebook Pixel tag
  </script>
</body>
</html>
